// Detect browser language
function detectLang() {
  const nav = navigator.language || navigator.userLanguage || "en";
  const code = nav.toLowerCase().substring(0, 2);
  const map = { en: "en", ht: "ht", fr: "fr", es: "es", pt: "pt" };
  // Special case: French from Haiti
  if (nav.toLowerCase().includes("ht")) return "ht";
  return map[code] || "en";
}

// ─── MINI MAP ────────────────────────────────────────────────────────────────
function MiniMap({ driverProgress = 0 }) {
  const W = 360, H = 200;
  const minLat = 39.750, maxLat = 39.790, minLng = -86.165, maxLng = -86.140;

  const toXY = (lat, lng) => ({
    x: ((lng - minLng) / (maxLng - minLng)) * W,
    y: H - ((lat - minLat) / (maxLat - minLat)) * H,
  });

  const pts = GPS_ROUTE.map(p => toXY(p.lat, p.lng));
  const pathD = pts.map((p, i) => `${i === 0 ? "M" : "L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");

  const idx = Math.min(Math.floor(driverProgress * (GPS_ROUTE.length - 1)), GPS_ROUTE.length - 1);
  const frac = (driverProgress * (GPS_ROUTE.length - 1)) - idx;
  const curr = idx < GPS_ROUTE.length - 1
    ? { x: pts[idx].x + (pts[idx + 1].x - pts[idx].x) * frac, y: pts[idx].y + (pts[idx + 1].y - pts[idx].y) * frac }
    : pts[pts.length - 1];

  const rest = toXY(39.7684, -86.1581);
  const dest = toXY(39.7820, -86.1450);

  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ borderRadius: 14, background: "#002D63", display: "block" }}>
      {/* Grid */}
      {[0.25, 0.5, 0.75].map(f => (
        <g key={f}>
          <line x1={W * f} y1={0} x2={W * f} y2={H} stroke="#003F87" strokeWidth={1} />
          <line x1={0} y1={H * f} x2={W} y2={H * f} stroke="#003F87" strokeWidth={1} />
        </g>
      ))}
      {/* Road dashes */}
      <path d={pathD} stroke="#004FA8" strokeWidth={10} fill="none" strokeLinecap="round" strokeLinejoin="round" />
      <path d={pathD} stroke="#003580" strokeWidth={8} fill="none" strokeLinecap="round" strokeLinejoin="round" />
      <path d={pathD} stroke="#6B9FDD" strokeWidth={3} fill="none" strokeLinecap="round" strokeLinejoin="round" strokeDasharray="8 6" />
      {/* Completed route */}
      {driverProgress > 0 && (
        <path
          d={pts.slice(0, idx + 2).map((p, i) => `${i === 0 ? "M" : "L"}${i <= idx ? p.x.toFixed(1) : curr.x.toFixed(1)},${i <= idx ? p.y.toFixed(1) : curr.y.toFixed(1)}`).join(" ")}
          stroke={T.primary} strokeWidth={4} fill="none" strokeLinecap="round" strokeLinejoin="round"
        />
      )}
      {/* Restaurant pin */}
      <circle cx={rest.x} cy={rest.y} r={10} fill="#E63946" opacity={0.2} />
      <circle cx={rest.x} cy={rest.y} r={6} fill="#E63946" />
      <text x={rest.x} y={rest.y - 14} textAnchor="middle" fontSize={9} fill="#E63946" fontFamily="DM Sans" fontWeight="700">RESTORAN</text>
      {/* Destination pin */}
      <circle cx={dest.x} cy={dest.y} r={10} fill={T.green} opacity={0.2} />
      <circle cx={dest.x} cy={dest.y} r={6} fill={T.green} />
      <text x={dest.x} y={dest.y - 14} textAnchor="middle" fontSize={9} fill={T.green} fontFamily="DM Sans" fontWeight="700">KLIYAN</text>
      {/* Driver dot */}
      {driverProgress > 0 && (
        <g>
          <circle cx={curr.x} cy={curr.y} r={14} fill={T.primary} opacity={0.15} />
          <circle cx={curr.x} cy={curr.y} r={9} fill={T.primary} />
          <text x={curr.x} y={curr.y + 4} textAnchor="middle" fontSize={10}>🚗</text>
        </g>
      )}
      {/* ETA badge */}
      <rect x={W - 80} y={8} width={72} height={24} rx={6} fill={T.primary} opacity={0.9} />
      <text x={W - 44} y={24} textAnchor="middle" fontSize={10} fill="#fff" fontFamily="DM Sans" fontWeight="700">
        {driverProgress >= 1 ? "Arrive!" : `~${Math.ceil((1 - driverProgress) * 18)} min`}
      </text>
    </svg>
  );
}

// ─── NOTIFICATION TOAST ──────────────────────────────────────────────────────
function Toast({ notif }) {
  if (!notif) return null;
  return (
    <div className="notif-anim" style={{
      position: "fixed", top: 16, left: "50%", transform: "translateX(-50%)",
      background: T.surface, border: `1px solid ${T.border}`, borderRadius: 14,
      padding: "12px 20px", zIndex: 9999, width: 340, boxShadow: "0 8px 32px #00000088",
      display: "flex", alignItems: "center", gap: 12,
    }}>
      <div style={{ fontSize: 28 }}>{notif.icon}</div>
      <div>
        <div style={{ fontWeight: 700, fontSize: 14, color: T.text }}>{notif.title}</div>
        <div style={{ fontSize: 12, color: T.muted, marginTop: 2 }}>{notif.body}</div>
      </div>
      <div style={{ marginLeft: "auto", background: notif.color || T.primary, borderRadius: 6, padding: "2px 8px", fontSize: 11, color: "#fff", fontWeight: 700 }}>
        {notif.tag}
      </div>
    </div>
  );
}

              <div style={{ fontWeight: 800, fontSize: 16, marginBottom: 16 }}>{L.deliveryInfo}</div>
              <label style={s.label}>{L.address}</label>
              <input style={{ ...s.input, marginBottom: 12 }} placeholder="3842 N Meridian St" value={deliveryInfo.address} onChange={e => setDeliveryInfo(p => ({ ...p, address: e.target.value }))} />
              <label style={s.label}>{L.apt}</label>
              <input style={{ ...s.input, marginBottom: 12 }} placeholder="Apt 2B" value={deliveryInfo.apt} onChange={e => setDeliveryInfo(p => ({ ...p, apt: e.target.value }))} />
              <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr", gap: 10 }}>
                <div><label style={s.label}>{L.city}</label><input style={s.input} value={deliveryInfo.city} onChange={e => setDeliveryInfo(p => ({ ...p, city: e.target.value }))} /></div>
                <div><label style={s.label}>{L.state}</label><input style={s.input} value="IN" readOnly /></div>
                <div><label style={s.label}>{L.zip}</label><input style={s.input} placeholder="46204" value={deliveryInfo.zip} onChange={e => setDeliveryInfo(p => ({ ...p, zip: e.target.value }))} /></div>
              </div>
            </div>
          </div>
        )}

        {/* Items */}
        <div style={s.card}>
          <div style={{ padding: 20 }}>
            <div style={{ fontWeight: 800, fontSize: 16, marginBottom: 16 }}>{L.items}</div>
            {cartItems.map(item => (
              <div key={item.id} style={{ ...s.row, marginBottom: 12 }}>
                <span>{item.emoji} {item.name} <span style={{ color: T.muted }}>×{cart[item.id]}</span></span>
                <span style={{ color: T.accent, fontWeight: 700 }}>${(item.price * cart[item.id]).toFixed(2)}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Tip */}
        <div style={s.card}>
          <div style={{ padding: 20 }}>
            <div style={{ fontWeight: 800, fontSize: 16, marginBottom: 16 }}>{L.driverTip}</div>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
              {DRIVER_TIPS.map(t => (
                <button key={t} className="btn-press" onClick={() => setTip(t)} style={{
                  background: tip === t ? `linear-gradient(135deg, ${T.accent}, ${T.accentDark})` : T.surface,
                  color: tip === t ? "#000" : T.text,
                  border: `2px solid ${tip === t ? T.accent : T.border}`,
                  borderRadius: 10, padding: "10px 16px", cursor: "pointer", fontWeight: 700, fontFamily: T.font, fontSize: 14,
                }}>
                  {t === 0 ? L.noTip : `$${t}`}
                </button>
              ))}
            </div>
          </div>
        </div>

        {/* Totals */}
        <div style={s.card}>
          <div style={{ padding: 20 }}>
            <div style={{ fontWeight: 800, fontSize: 16, marginBottom: 16 }}>{L.total}</div>
            {[
              [L.subtotal, subtotal, T.text],
              [L.restaurantTax, tax, T.text],
              [L.platformFee, PLATFORM_FEE, T.text],
              ...(orderType === "delivery" ? [[L.deliveryFee, deliveryFee, T.text]] : []),
              [L.tipLabel, tip, T.text],
            ].map(([label, val, color]) => (
              <div key={label} style={{ ...s.row, marginBottom: 12 }}>
                <span style={{ color: T.muted, fontSize: 14 }}>{label}</span>
                <span style={{ color, fontSize: 14 }}>${Number(val).toFixed(2)}</span>
              </div>
            ))}
            <div style={{ height: 1, background: T.border, margin: "12px 0" }} />
            <div style={s.row}>
              <span style={{ fontWeight: 900, fontSize: 18 }}>{L.grandTotal}</span>
              <span style={{ fontWeight: 900, fontSize: 26, color: T.accent }}>${grandTotal.toFixed(2)}</span>
            </div>
          </div>
        </div>

        {/* Revenue split */}
        <div style={{ margin: "0 16px 16px", background: "#0D1527", borderRadius: 14, padding: 16, border: `1px solid #1a2a4a` }}>
          <div style={{ fontSize: 11, color: T.muted, fontWeight: 700, letterSpacing: "0.8px", marginBottom: 12 }}>{L.distribution}</div>
          {[
            { label: L.restaurantEarns, val: subtotal, color: T.green },
            { label: L.driverEarns, val: deliveryFee * 0.7, color: "#60A5FA" },
            { label: L.platformEarns, val: deliveryFee * 0.3 + PLATFORM_FEE, color: T.accent },
          ].map(({ label, val, color }) => (
            <div key={label} style={{ ...s.row, marginBottom: 10 }}>
              <span style={{ fontSize: 13, color: T.muted }}>{label}</span>
              <span style={{ fontSize: 13, color, fontWeight: 700 }}>${val.toFixed(2)}</span>
            </div>
          ))}
        </div>

        <div style={{ padding: "0 16px 16px" }}>
          <button className="btn-press" style={s.btnGold} onClick={() => setScreen("checkout")}>
            {L.stripeBtn(grandTotal.toFixed(2))}
          </button>
        </div>
      </div>
      <Toast notif={notif} />
    </div>
  );

  // ── MENU ──────────────────────────────────────────────────────────────────
  if (screen === "menu" && selectedRestaurant) return (
    <div style={s.app}>
      <style>{css}</style>
      <div style={{ ...s.header, background: selectedRestaurant.color + "22", borderBottom: `1px solid ${selectedRestaurant.color}44` }}>
        <div style={s.row}>
          <button onClick={() => setScreen("home")} style={{ background: "none", border: "none", color: T.text, fontSize: 22, cursor: "pointer" }}>←</button>
          <div style={{ ...s.logo, fontSize: 18 }}>{selectedRestaurant.name}</div>
          {cartCount > 0 && (
            <button className="btn-press" style={{ background: "#fff", color: T.primary, border: `2px solid ${T.primary}`, borderRadius: 20, padding: "6px 14px", fontWeight: 800, cursor: "pointer", fontFamily: T.font, fontSize: 13, boxShadow: "0 2px 8px #003F8733", textDecoration: "underline" }}
              onClick={() => setScreen("order-summary")}>
              🛒 {cartCount}
            </button>
          )}
        </div>
      </div>
      <div style={s.screen}>
        <div style={{ padding: "16px 16px 0", display: "flex", gap: 8 }}>
          <div style={s.tag}>⭐ {selectedRestaurant.rating}</div>
          <div style={s.tag}>⏱ {selectedRestaurant.time}</div>
          <div style={s.tag}>🚗 ${selectedRestaurant.fee}</div>
        </div>
        <div style={s.title}>{L.menu}</div>
        {selectedRestaurant.items.map(item => (
          <div key={item.id} style={s.card} className="card-hover">
            <div style={{ padding: 18 }}>
              <div style={s.row}>
                <div style={{ display: "flex", gap: 14, flex: 1, alignItems: "center" }}>
                  <div style={{ fontSize: 36, background: T.surface, borderRadius: 12, padding: "8px 12px", flexShrink: 0 }}>{item.emoji}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 700, fontSize: 15 }}>{item.name}</div>
                    <div style={{ color: T.muted, fontSize: 12, marginTop: 3 }}>{item.desc}</div>
                    <div style={{ color: T.accent, fontWeight: 800, fontSize: 16, marginTop: 8 }}>${item.price}</div>
                  </div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginLeft: 12 }}>
                  {cart[item.id] > 0 && (
                    <>
                      <button className="btn-press" onClick={() => removeFromCart(item)} style={{ background: T.surface, border: `1px solid ${T.border}`, color: T.text, borderRadius: "50%", width: 32, height: 32, fontSize: 18, cursor: "pointer" }}>−</button>
                      <span style={{ fontWeight: 700, minWidth: 22, textAlign: "center" }}>{cart[item.id]}</span>
                    </>
                  )}
                  <button className="btn-press" onClick={() => addToCart(item)} style={{ background: `linear-gradient(135deg, ${T.primary}, ${T.primaryDark})`, border: "none", color: "#fff", borderRadius: "50%", width: 36, height: 36, fontSize: 20, cursor: "pointer" }}>+</button>
                </div>
              </div>
            </div>
          </div>
        ))}
        {cartCount > 0 && (
          <div style={{ padding: "8px 16px 16px" }}>
            <button className="btn-press" style={s.btnGold} onClick={() => setScreen("order-summary")}>
              {L.cartLabel(cartCount, subtotal.toFixed(2))}
            </button>
          </div>
        )}
      </div>
      <Toast notif={notif} />
    </div>
  );

  // ── HOME ──────────────────────────────────────────────────────────────────
  return (
    <div style={{ ...s.app, background: "#EEF2FF" }}>
      <style>{css}</style>
      <div style={{ ...s.header, background: "linear-gradient(135deg, #003F87, #002D63)", padding: "18px 20px 14px" }}>
        <div style={s.row}>
          <div>
            <LogoSVG height={42} />
            <div style={{ color: "#ffffff88", fontSize: 12, marginTop: 2 }}>{L.location}</div>
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            {/* Language flags */}
            <div style={{ display: "flex", gap: 4 }}>
              {[["en","🇺🇸"],["ht","🇭🇹"],["es","🇪🇸"],["fr","🇫🇷"],["pt","🇧🇷"]].map(([code, flag]) => (
                <button key={code} onClick={() => setLang(code)} style={{
                  background: lang === code ? "#fff" : "#ffffff22",
                  border: lang === code ? "2px solid #FFD700" : "1px solid #ffffff33",
                  borderRadius: 6, padding: "3px 5px", cursor: "pointer", fontSize: 14, lineHeight: 1
                }}>{flag}</button>
              ))}
            </div>
            <button className="btn-press" style={{ background: "#ffffff22", border: "1px solid #ffffff44", color: "#fff", borderRadius: 10, padding: "8px 10px", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: T.font }}
              onClick={() => setScreen("role")}>
              {L.changeRole}
            </button>
          </div>
        </div>
        <div style={{ marginTop: 14, background: "#ffffff15", borderRadius: 12, padding: "12px 16px", display: "flex", gap: 10, alignItems: "center", border: "1px solid #ffffff22" }}>
          <span style={{ fontSize: 16 }}>🔍</span>
          <span style={{ color: "#ffffff66", fontSize: 14 }}>{L.search}</span>
        </div>
      </div>
      <div style={s.screen}>
        {/* Hero banner */}
        <div style={{ margin: "16px 16px 0", background: "linear-gradient(135deg, #003F87, #D01C1F)", borderRadius: 18, padding: 24 }}>
          <div style={{ fontSize: 11, color: "#FFD700", fontWeight: 700, letterSpacing: "1px", marginBottom: 8 }}>{L.community}</div>
          <div style={{ fontWeight: 900, fontSize: 22, lineHeight: 1.3, color: "#fff" }}>{L.tagline.split("\n").map((t,i) => <span key={i}>{t}{i===0&&<br/>}</span>)}</div>
          <div style={{ color: "#FFD700", fontWeight: 700, marginTop: 12, fontSize: 14 }}>{L.freeDelivery}</div>
        </div>

        {/* Categories */}
        <div style={{ padding: "20px 16px 0", display: "flex", gap: 10, overflowX: "auto" }}>
          {["🍽️", "🥩", "🍚", "🥣", "🍮"].map(c => (
            <div key={c} style={{ background: "#fff", border: `1px solid ${T.border}`, borderRadius: 20, padding: "8px 16px", fontSize: 16, fontWeight: 600, whiteSpace: "nowrap", cursor: "pointer", flexShrink: 0, color: T.text, boxShadow: "0 1px 4px #00000011" }}>{c}</div>
          ))}
        </div>

        <div style={{ ...s.title, color: T.text }}>{L.restaurants}</div>
        {RESTAURANTS.map(r => (
          <div key={r.id} style={{ ...s.card, cursor: "pointer", boxShadow: "0 2px 12px #00000011" }} className="card-hover"
            onClick={() => { setSelectedRestaurant(r); setCart({}); setScreen("menu"); }}>
            <div style={{ padding: 20 }}>
              <div style={s.row}>
                <div style={{ display: "flex", gap: 16, alignItems: "center", flex: 1 }}>
                  <div style={{ fontSize: 44, background: r.color + "18", borderRadius: 16, padding: "10px 14px", border: `1px solid ${r.color}33`, flexShrink: 0 }}>{r.image}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 800, fontSize: 16, color: T.text }}>{r.name}</div>
                    <div style={{ color: T.muted, fontSize: 13, marginTop: 3 }}>{r.cuisine}</div>
                    <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
                      <div style={s.tag}>⭐ {r.rating}</div>
                      <div style={s.tag}>⏱ {r.time}</div>
                      <div style={s.tag}>🚗 ${r.fee}</div>
                    </div>
                  </div>
                </div>
                <span style={{ color: T.primary, fontSize: 22 }}>›</span>
              </div>
            </div>
          </div>
        ))}
      </div>
      <Toast notif={notif} />
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<RapidDelivri />);
  </script>
</body>
</html>
