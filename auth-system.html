    const T = {
      primary: "#003F87", primaryDark: "#002D63",
      accent: "#D01C1F", green: "#16A34A",
      text: "#0D1B3E", muted: "#6B7893",
      border: "#E2E6F0", surface: "#F8FAFF",
    };

    const inp = {
      background: T.surface, border: `1px solid ${T.border}`,
      borderRadius: 10, padding: "13px 14px", color: T.text,
      fontSize: 14, width: "100%", fontFamily: "DM Sans", outline: "none",
      boxSizing: "border-box",
    };

    const btn = (bg, color="#fff") => ({
      background: bg, color, border: "none", borderRadius: 14,
      padding: "16px", fontSize: 16, fontWeight: 700, width: "100%",
      cursor: "pointer", fontFamily: "DM Sans", marginTop: 8,
    });

    function Header({ title, onBack }) {
      return (
        <div style={{ background: `linear-gradient(135deg, ${T.primary}, ${T.primaryDark})`, padding: "16px 20px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            {onBack && <button onClick={onBack} style={{ background: "none", border: "none", color: "#fff", fontSize: 22, cursor: "pointer" }}>←</button>}
            <img src={LOGO} style={{ width: 36, height: 36, borderRadius: "50%", objectFit: "cover" }} />
            <div style={{ fontSize: 17, fontWeight: 800, color: "#fff" }}>{title}</div>
          </div>
        </div>
      );
    }

    function FileUpload({ label, bucket, path, onUpload, accept="image/*" }) {
      const [uploading, setUploading] = useState(false);
      const [done, setDone] = useState(false);
      const ref = useRef();
      const handle = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setUploading(true);
        try {
          const ext = file.name.split(".").pop();
          const fp = `${path}-${Date.now()}.${ext}`;
          const { error } = await supabase.storage.from(bucket).upload(fp, file);
          if (error) throw error;
          const { data } = supabase.storage.from(bucket).getPublicUrl(fp);
          setDone(true);
          onUpload(data.publicUrl || fp);
        } catch(err) { alert("Upload failed: " + err.message); }
        setUploading(false);
      };
      return (
        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 11, color: T.muted, fontWeight: 700, letterSpacing: "0.8px", textTransform: "uppercase", marginBottom: 6 }}>{label}</div>
          <div onClick={() => ref.current.click()} style={{ border: `2px dashed ${done ? T.green : T.border}`, borderRadius: 10, padding: 16, textAlign: "center", cursor: "pointer", background: T.surface }}>
            <input ref={ref} type="file" accept={accept} style={{ display: "none" }} onChange={handle} />
            {uploading ? "⏳ Uploading..." : done ? "✅ Uploaded!" : `📎 Upload ${label}`}
          </div>
        </div>
      );
    }

    // ── CUSTOMER REGISTER ──
    function CustomerRegister({ onBack }) {
      const [form, setForm] = useState({ email: "", password: "", confirmPassword: "", first_name: "", last_name: "", phone: "", address: "", apartment: "", city: "", state: "IN", zip: "", id_document_type: "state_id" });
      const [idUrl, setIdUrl] = useState("");
      const [loading, setLoading] = useState(false);
      const [errors, setErrors] = useState({});

      const set = (k, v) => { setForm(p => ({...p, [k]: v})); setErrors(p => ({...p, [k]: ""})); };

      const submit = async () => {
        const e = {};
        if (!form.email) e.email = "Email obligatwa";
        if (!form.password) e.password = "Password obligatwa";
        if (form.password.length < 6) e.password = "Omwen 6 karaktè";
        if (form.password !== form.confirmPassword) e.confirmPassword = "Password pa matche";
        if (!form.first_name) e.first_name = "Prenon obligatwa";
        if (!form.last_name) e.last_name = "Non obligatwa";
        if (!form.address) e.address = "Adres obligatwa";
        if (!form.city) e.city = "Vil obligatwa";
        if (!form.zip) e.zip = "ZIP obligatwa";
        if (!idUrl) e.id = "ID obligatwa";
        if (Object.keys(e).length > 0) { setErrors(e); return; }
        setLoading(true);
        try {
          // Create Supabase Auth user
          const { data: authData, error: authError } = await supabase.auth.signUp({
            email: form.email,
            password: form.password,
            options: { data: { role: "customer", first_name: form.first_name, last_name: form.last_name } }
          });
          if (authError) throw authError;

          // Save to customers table
          const { error: dbError } = await supabase.from("customers").insert([{
            email: form.email, first_name: form.first_name, last_name: form.last_name,
            phone: form.phone, address: form.address, apartment: form.apartment,
            city: form.city, state: form.state, zip: form.zip,
            id_document_url: idUrl, id_document_type: form.id_document_type,
          }]);
          if (dbError) throw dbError;
          alert("✅ Kont kreye! Tcheke email ou pou konfirme.");
          window.location.href = "/";
        } catch(err) { alert("Erè: " + err.message); }
        setLoading(false);
      };

      const F = (k, ph, type="text") => (
        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 11, color: T.muted, fontWeight: 700, letterSpacing: "0.8px", textTransform: "uppercase", marginBottom: 6 }}>{k.replace(/_/g," ").toUpperCase()}</div>
          <input style={{...inp, borderColor: errors[k] ? T.accent : T.border}} type={type}
            placeholder={ph} value={form[k]} onChange={e => set(k, e.target.value)} />
          {errors[k] && <div style={{color: T.accent, fontSize: 12, marginTop: 4}}>{errors[k]}</div>}
        </div>
      );

      return (
        <div style={{ maxWidth: 480, margin: "0 auto", background: "#EEF2FF", minHeight: "100vh" }}>
          <Header title="👤 Kreye Kont Kliyan" onBack={onBack} />
          <div style={{ padding: "16px 16px 100px" }}>
            <div style={{ background: "#fff", borderRadius: 16, padding: 20, marginBottom: 14, border: `1px solid ${T.border}` }}>
              <div style={{ fontWeight: 800, color: T.primary, marginBottom: 16 }}>📋 Enfòmasyon Pèsonèl</div>
              {F("first_name", "Prenon")}
              {F("last_name", "Non fanmi")}
              {F("email", "email@exemple.com", "email")}
              {F("phone", "(317) 555-0000", "tel")}
            </div>
            <div style={{ background: "#fff", borderRadius: 16, padding: 20, marginBottom: 14, border: `1px solid ${T.border}` }}>
              <div style={{ fontWeight: 800, color: T.primary, marginBottom: 16 }}>🔐 Sekirite</div>
              {F("password", "Omwen 6 karaktè", "password")}
              {F("confirmPassword", "Repete password ou", "password")}
            </div>
            <div style={{ background: "#fff", borderRadius: 16, padding: 20, marginBottom: 14, border: `1px solid ${T.border}` }}>
              <div style={{ fontWeight: 800, color: T.primary, marginBottom: 16 }}>📍 Adres</div>
              {F("address", "3842 N Meridian St")}
              {F("apartment", "Apt 2B (Opsyonèl)")}
              <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr", gap: 10 }}>
                <div>{F("city", "Indianapolis")}</div>
                <div><div style={{fontSize:11,color:T.muted,fontWeight:700,textTransform:"uppercase",marginBottom:6}}>ETA</div><input style={{...inp}} value="IN" readOnly /></div>
                <div>{F("zip", "46204")}</div>
              </div>
            </div>
            <div style={{ background: "#fff", borderRadius: 16, padding: 20, marginBottom: 14, border: `1px solid ${T.border}` }}>
              <div style={{ fontWeight: 800, color: T.primary, marginBottom: 16 }}>🪪 Verifikasyon ID</div>
              <div style={{ marginBottom: 12 }}>
                <div style={{fontSize:11,color:T.muted,fontWeight:700,textTransform:"uppercase",marginBottom:6}}>TIP ID</div>
                <select style={{...inp}} value={form.id_document_type} onChange={e => set("id_document_type", e.target.value)}>

              {loading ? "⏳ Ap kreye kont..." : "✅ Kreye Kont Mwen"}
            </button>
          </div>
        </div>
      );
    }

    // ── DRIVER REGISTER ──
    function DriverRegister({ onBack }) {
      const [form, setForm] = useState({ email: "", password: "", confirmPassword: "", first_name: "", last_name: "", phone: "", address: "", apartment: "", city: "", state: "IN", zip: "", vehicle_make: "", vehicle_model: "", vehicle_year: "", vehicle_color: "", vehicle_plate: "" });
      const [docs, setDocs] = useState({ license: "", registration: "", insurance: "", selfie: "" });
      const [loading, setLoading] = useState(false);
      const [errors, setErrors] = useState({});

      const set = (k, v) => { setForm(p => ({...p, [k]: v})); setErrors(p => ({...p, [k]: ""})); };

      const submit = async () => {
        const e = {};
        if (!form.email) e.email = "Email obligatwa";
        if (!form.password || form.password.length < 6) e.password = "Omwen 6 karaktè";
        if (form.password !== form.confirmPassword) e.confirmPassword = "Password pa matche";
        if (!form.first_name) e.first_name = "Prenon obligatwa";
        if (!form.phone) e.phone = "Telefòn obligatwa";
        if (!form.address) e.address = "Adres obligatwa";
        if (!docs.license) e.license = "Lisans obligatwa";
        if (!docs.registration) e.registration = "Anrejistreman obligatwa";
        if (!docs.insurance) e.insurance = "Asirans obligatwa";
        if (!docs.selfie) e.selfie = "Selfie obligatwa";
        if (Object.keys(e).length > 0) { setErrors(e); return; }
        setLoading(true);
        try {
          const { error: authError } = await supabase.auth.signUp({
            email: form.email, password: form.password,
            options: { data: { role: "driver" } }
          });
          if (authError) throw authError;

          const { data, error: dbError } = await supabase.from("drivers").insert([{
            ...form,
            drivers_license_url: docs.license,
            vehicle_registration_url: docs.registration,
            vehicle_insurance_url: docs.insurance,
            selfie_url: docs.selfie,
          }]).select();
          if (dbError) throw dbError;

          await supabase.from("admin_approvals").insert([{
            applicant_id: data[0].id,
            applicant_type: "driver",
            applicant_name: `${form.first_name} ${form.last_name}`,
            status: "pending"
          }]);
          alert("✅ Aplikasyon soumèt! Ou ap resevwa yon email lè kont ou apwouve.");
          window.location.href = "/";
        } catch(err) { alert("Erè: " + err.message); }
        setLoading(false);
      };

      const F = (k, ph, type="text") => (
        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 11, color: T.muted, fontWeight: 700, letterSpacing: "0.8px", textTransform: "uppercase", marginBottom: 6 }}>{k.replace(/_/g," ").toUpperCase()}</div>
          <input style={{...inp, borderColor: errors[k] ? T.accent : T.border}} type={type}
            placeholder={ph} value={form[k]} onChange={e => set(k, e.target.value)} />
          {errors[k] && <div style={{color:T.accent,fontSize:12,marginTop:4}}>{errors[k]}</div>}
        </div>
      );

      return (
        <div style={{ maxWidth: 480, margin: "0 auto", background: "#EEF2FF", minHeight: "100vh" }}>
          <Header title="🚗 Enskripsyon Chaofè" onBack={onBack} />
          <div style={{ padding: "16px 16px 100px" }}>
            <div style={{ background: "#fff", borderRadius: 16, padding: 20, marginBottom: 14, border: `1px solid ${T.border}` }}>
              <div style={{ fontWeight: 800, color: T.accent, marginBottom: 16 }}>📋 Enfòmasyon Pèsonèl</div>
              {F("first_name", "Prenon")} {F("last_name", "Non fanmi")}
              {F("email", "email@exemple.com", "email")} {F("phone", "(317) 555-0000", "tel")}
            </div>
            <div style={{ background: "#fff", borderRadius: 16, padding: 20, marginBottom: 14, border: `1px solid ${T.border}` }}>
              <div style={{ fontWeight: 800, color: T.accent, marginBottom: 16 }}>🔐 Sekirite</div>
              {F("password", "Omwen 6 karaktè", "password")}
              {F("confirmPassword", "Repete password", "password")}
            </div>
            <div style={{ background: "#fff", borderRadius: 16, padding: 20, marginBottom: 14, border: `1px solid ${T.border}` }}>
              <div style={{ fontWeight: 800, color: T.accent, marginBottom: 16 }}>📍 Adres</div>
              {F("address", "3842 N Meridian St")} {F("apartment", "Apt (Opsyonèl)")}
              <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr", gap: 10 }}>
                <div>{F("city","Indianapolis")}</div>
                <div><div style={{fontSize:11,color:T.muted,fontWeight:700,textTransform:"uppercase",marginBottom:6}}>ETA</div><input style={{...inp}} value="IN" readOnly /></div>
                <div>{F("zip","46204")}</div>
              </div>
            </div>
            <div style={{ background: "#fff", borderRadius: 16, padding: 20, marginBottom: 14, border: `1px solid ${T.border}` }}>
              <div style={{ fontWeight: 800, color: T.accent, marginBottom: 16 }}>🚙 Machin</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <div>{F("vehicle_make","Toyota")}</div> <div>{F("vehicle_model","Camry")}</div>
                <div>{F("vehicle_year","2020")}</div> <div>{F("vehicle_color","Blan")}</div>
              </div>
              {F("vehicle_plate","ABC 123")}
            </div>
            <div style={{ background: "#fff", borderRadius: 16, padding: 20, marginBottom: 14, border: `1px solid ${T.border}` }}>
              <div style={{ fontWeight: 800, color: T.accent, marginBottom: 16 }}>📄 Dokiman</div>
              <FileUpload label="Lisans Kondwi" bucket="driver-documents" path="license" onUpload={u => { setDocs(p=>({...p,license:u})); setErrors(p=>({...p,license:""})); }} />
              {errors.license && <div style={{color:T.accent,fontSize:12,marginBottom:8}}>{errors.license}</div>}
              <FileUpload label="Anrejistreman Machin" bucket="driver-documents" path="registration" onUpload={u => { setDocs(p=>({...p,registration:u})); setErrors(p=>({...p,registration:""})); }} />
              {errors.registration && <div style={{color:T.accent,fontSize:12,marginBottom:8}}>{errors.registration}</div>}
              <FileUpload label="Asirans Machin" bucket="driver-documents" path="insurance" onUpload={u => { setDocs(p=>({...p,insurance:u})); setErrors(p=>({...p,insurance:""})); }} />
              {errors.insurance && <div style={{color:T.accent,fontSize:12,marginBottom:8}}>{errors.insurance}</div>}
              <FileUpload label="Selfie (Foto Ou)" bucket="driver-selfies" path="selfie" onUpload={u => { setDocs(p=>({...p,selfie:u})); setErrors(p=>({...p,selfie:""})); }} />
              {errors.selfie && <div style={{color:T.accent,fontSize:12,marginBottom:8}}>{errors.selfie}</div>}
            </div>
            <button style={{...btn(`linear-gradient(135deg,${T.accent},#A81518)`)}}) onClick={submit} disabled={loading}>
              {loading ? "⏳ Ap soumèt..." : "🚗 Soumèt Aplikasyon"}
            </button>
          </div>
        </div>
      );
    }

    // ── RESTAURANT REGISTER ──
    function RestaurantRegister({ onBack }) {
      const [form, setForm] = useState({ restaurant_name: "", owner_name: "", email: "", password: "", confirmPassword: "", phone: "", address: "", apartment: "", city: "", state: "IN", zip: "", ein_number: "" });
      const [menuUrl, setMenuUrl] = useState("");
      const [logoUrl, setLogoUrl] = useState("");
      const [loading, setLoading] = useState(false);
      const [errors, setErrors] = useState({});

      const set = (k, v) => { setForm(p => ({...p, [k]: v})); setErrors(p => ({...p, [k]: ""})); };

      const submit = async () => {
        const e = {};
        if (!form.restaurant_name) e.restaurant_name = "Non restoran obligatwa";
        if (!form.owner_name) e.owner_name = "Non pwopriyetè obligatwa";
        if (!form.email) e.email = "Email obligatwa";
        if (!form.password || form.password.length < 6) e.password = "Omwen 6 karaktè";
        if (form.password !== form.confirmPassword) e.confirmPassword = "Password pa matche";
        if (!form.address) e.address = "Adres obligatwa";
        if (!form.city) e.city = "Vil obligatwa";
        if (!form.zip) e.zip = "ZIP obligatwa";
        if (!form.ein_number) e.ein_number = "EIN obligatwa";
        if (!menuUrl) e.menu = "Menu PDF obligatwa";
        if (Object.keys(e).length > 0) { setErrors(e); return; }
        setLoading(true);
        try {
          const { error: authError } = await supabase.auth.signUp({
            email: form.email, password: form.password,
            options: { data: { role: "restaurant" } }
          });
          if (authError) throw authError;

          const { data, error: dbError } = await supabase.from("restaurants").insert([{
            restaurant_name: form.restaurant_name, owner_name: form.owner_name,
            email: form.email, phone: form.phone, address: form.address,
            apartment: form.apartment, city: form.city, state: form.state,
            zip: form.zip, ein_number: form.ein_number,
            menu_pdf_url: menuUrl, logo_url: logoUrl,
          }]).select();
          if (dbError) throw dbError;

          await supabase.from("admin_approvals").insert([{
            applicant_id: data[0].id,
            applicant_type: "restaurant",
            applicant_name: form.restaurant_name,
            status: "pending"
          }]);
          alert("✅ Aplikasyon soumèt! Ou ap resevwa yon email lè restoran ou apwouve.");
          window.location.href = "/";
        } catch(err) { alert("Erè: " + err.message); }
        setLoading(false);
      };

      const F = (k, ph, type="text") => (
        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 11, color: T.muted, fontWeight: 700, letterSpacing: "0.8px", textTransform: "uppercase", marginBottom: 6 }}>{k.replace(/_/g," ").toUpperCase()}</div>
          <input style={{...inp, borderColor: errors[k] ? T.accent : T.border}} type={type}
            placeholder={ph} value={form[k]} onChange={e => set(k, e.target.value)} />
          {errors[k] && <div style={{color:T.accent,fontSize:12,marginTop:4}}>{errors[k]}</div>}
        </div>
      );

      return (
        <div style={{ maxWidth: 480, margin: "0 auto", background: "#EEF2FF", minHeight: "100vh" }}>
          <Header title="🍴 Enskripsyon Restoran" onBack={onBack} />
          <div style={{ padding: "16px 16px 100px" }}>
            <div style={{ background: "#fff", borderRadius: 16, padding: 20, marginBottom: 14, border: `1px solid ${T.border}` }}>
              <div style={{ fontWeight: 800, color: "#1a6b3a", marginBottom: 16 }}>🏪 Enfòmasyon Restoran</div>
              {F("restaurant_name","Kay Manman Restaurant")} {F("owner_name","Non Pwopriyetè")}
              {F("email","restaurant@exemple.com","email")} {F("phone","(317) 555-0000","tel")}
            </div>
            <div style={{ background: "#fff", borderRadius: 16, padding: 20, marginBottom: 14, border: `1px solid ${T.border}` }}>
              <div style={{ fontWeight: 800, color: "#1a6b3a", marginBottom: 16 }}>🔐 Sekirite</div>
              {F("password","Omwen 6 karaktè","password")}
              {F("confirmPassword","Repete password","password")}
            </div>
            <div style={{ background: "#fff", borderRadius: 16, padding: 20, marginBottom: 14, border: `1px solid ${T.border}` }}>
              <div style={{ fontWeight: 800, color: "#1a6b3a", marginBottom: 16 }}>📍 Adres Restoran</div>
              {F("address","1204 E Washington St")} {F("apartment","Suite (Opsyonèl)")}
              <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr", gap: 10 }}>
                <div>{F("city","Indianapolis")}</div>
                <div><div style={{fontSize:11,color:T.muted,fontWeight:700,textTransform:"uppercase",marginBottom:6}}>ETA</div><input style={{...inp}} value="IN" readOnly /></div>
                <div>{F("zip","46201")}</div>
              </div>
            </div>
            <div style={{ background: "#fff", borderRadius: 16, padding: 20, marginBottom: 14, border: `1px solid ${T.border}` }}>
              <div style={{ fontWeight: 800, color: "#1a6b3a", marginBottom: 16 }}>💼 EIN Number</div>
              {F("ein_number","XX-XXXXXXX")}
              {errors.ein_number && <div style={{color:T.accent,fontSize:12}}>{errors.ein_number}</div>}
            </div>
            <div style={{ background: "#fff", borderRadius: 16, padding: 20, marginBottom: 14, border: `1px solid ${T.border}` }}>
              <div style={{ fontWeight: 800, color: "#1a6b3a", marginBottom: 16 }}>📄 Dokiman</div>
              <FileUpload label="Menu PDF (Obligatwa)" bucket="restaurant-documents" path="menu" accept=".pdf,image/*" onUpload={u => { setMenuUrl(u); setErrors(p=>({...p,menu:""})); }} />
              {errors.menu && <div style={{color:T.accent,fontSize:12,marginBottom:8}}>{errors.menu}</div>}
              <FileUpload label="Logo Restoran (Opsyonèl)" bucket="restaurant-documents" path="logo" onUpload={setLogoUrl} />
            </div>
            <button style={{...btn("linear-gradient(135deg,#1a6b3a,#0d4a28)")}}) onClick={submit} disabled={loading}>
              {loading ? "⏳ Ap soumèt..." : "🍴 Soumèt Aplikasyon"}
            </button>
          </div>
        </div>
      );
    }

    // ── MAIN APP ──
    function App() {
      const [screen, setScreen] = useState("home");

      if (screen === "customer") return <CustomerRegister onBack={() => setScreen("home")} />;
      if (screen === "driver") return <DriverRegister onBack={() => setScreen("home")} />;
      if (screen === "restaurant") return <RestaurantRegister onBack={() => setScreen("home")} />;

      return (
        <div style={{ maxWidth: 480, margin: "0 auto", fontFamily: "DM Sans", minHeight: "100vh", background: "linear-gradient(160deg, #003F87 0%, #002D63 45%, #D01C1F 100%)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24 }}>
          <img src={LOGO} style={{ width: 160, height: 160, borderRadius: "50%", objectFit: "cover", border: "4px solid #FFD700", marginBottom: 16 }} />
          <div style={{ color: "#ffffff88", fontSize: 14, marginBottom: 40 }}>Indianapolis Haitian Food Platform 🇭🇹</div>

          <div style={{ width: "100%", display: "flex", flexDirection: "column", gap: 14 }}>
            {[
              { id: "customer", icon: "👤", title: "Mwen se Kliyan", desc: "Kòmande manje Ayisyen livré lakay ou", color: "#fff", textColor: "#003F87" },
              { id: "driver", icon: "🚗", title: "Mwen se Chaofè", desc: "Livre manje — touche 70% delivery fee", color: "transparent", textColor: "#fff", border: "2px solid #fff" },
              { id: "restaurant", icon: "🍴", title: "Mwen se Restoran", desc: "Ajoute restoran ou sou platfòm nan", color: "transparent", textColor: "#fff", border: "2px solid #FFD700" },
            ].map((item) => (
              <button key={item.id} onClick={() => setScreen(item.id)}
                style={{ background: item.color, color: item.textColor, border: item.border || "none", borderRadius: 16, padding: "18px 20px", cursor: "pointer", fontFamily: "DM Sans", textAlign: "left", display: "flex", gap: 14, alignItems: "center" }}>
                <div style={{ fontSize: 32 }}>{item.icon}</div>
                <div>
                  <div style={{ fontWeight: 800, fontSize: 16 }}>{item.title}</div>
                  <div style={{ fontSize: 13, opacity: 0.8, marginTop: 4 }}>{item.desc}</div>
                </div>
              </button>
            ))}
          </div>

          <div style={{ textAlign: "center", marginTop: 24, color: "#ffffff66", fontSize: 13 }}>
            Ou deja gen yon kont?{" "}
            <span style={{ color: "#FFD700", fontWeight: 700, cursor: "pointer" }}
              onClick={() => window.location.href = "/"}>
              Sign In →
            </span>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
