    function FileUpload({ label, bucket, path, onUpload, accept="image/*" }) {
      const [uploading, setUploading] = useState(false);
      const [done, setDone] = useState(false);
      const ref = useRef();
      const handle = async (e) => {
        const file = e.target.files[0];
        if (!file || !supabase) return;
        setUploading(true);
        try {
          const ext = file.name.split(".").pop();
          const fp = `${path}-${Date.now()}.${ext}`;
          const { error } = await supabase.storage.from(bucket).upload(fp, file);
          if (error) throw error;
          const { data } = supabase.storage.from(bucket).getPublicUrl(fp);
          setDone(true);
          onUpload(data.publicUrl || fp);
        } catch(err) { alert("Upload failed: " + err.message); }
        setUploading(false);
      };
      return (
        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 11, color: T.muted, fontWeight: 700, letterSpacing: "0.8px", textTransform: "uppercase", marginBottom: 6 }}>{label}</div>
          <div onClick={() => ref.current?.click()} style={{ border: `2px dashed ${done ? T.green : T.border}`, borderRadius: 10, padding: 16, textAlign: "center", cursor: "pointer", background: T.surface }}>
            <input ref={ref} type="file" accept={accept} style={{ display: "none" }} onChange={handle} />
            {uploading ? "⏳ Uploading..." : done ? "✅ Uploaded!" : `📎 Upload ${label}`}
          </div>
        </div>
      );
    }

          if (authError) throw authError;

          const { data, error: dbError } = await supabase.from("restaurants").insert([{
            restaurant_name: form.restaurant_name, owner_name: form.owner_name,
            email: form.email, phone: form.phone, address: form.address,
            apartment: form.apartment, city: form.city, state: form.state,
            zip: form.zip, ein_number: form.ein_number,
            menu_pdf_url: menuUrl, logo_url: logoUrl,
          }]).select();
          if (dbError) throw dbError;

          await supabase.from("admin_approvals").insert([{
            applicant_id: data[0].id,
            applicant_type: "restaurant",
            applicant_name: form.restaurant_name,
            status: "pending"
          }]);
          alert("✅ Aplikasyon soumèt! Ou ap resevwa yon email lè restoran ou apwouve.");
          window.location.href = "/";
        } catch(err) { alert("Erè: " + err.message); }
        setLoading(false);
      };

      const F = (k, ph, type="text") => (
        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 11, color: T.muted, fontWeight: 700, letterSpacing: "0.8px", textTransform: "uppercase", marginBottom: 6 }}>{k.replace(/_/g," ").toUpperCase()}</div>
          <input style={{...inp, borderColor: errors[k] ? T.accent : T.border}} type={type}
            placeholder={ph} value={form[k]} onChange={e => set(k, e.target.value)} disabled={loading} />
          {errors[k] && <div style={{color:T.accent,fontSize:12,marginTop:4}}>{errors[k]}</div>}
        </div>
      );

      return (
        <div style={{ maxWidth: 480, margin: "0 auto", background: "#EEF2FF", minHeight: "100vh" }}>
          <Header title="🍴 Enskripsyon Restoran" onBack={onBack} />
          <div style={{ padding: "16px 16px 100px" }}>
            <div style={{ background: "#fff", borderRadius: 16, padding: 20, marginBottom: 14, border: `1px solid ${T.border}` }}>
              <div style={{ fontWeight: 800, color: "#1a6b3a", marginBottom: 16 }}>🏪 Enfòmasyon Restoran</div>
              {F("restaurant_name","Kay Manman Restaurant")} {F("owner_name","Non Pwopriyetè")}
              {F("email","restaurant@exemple.com","email")} {F("phone","(317) 555-0000","tel")}
            </div>
            <div style={{ background: "#fff", borderRadius: 16, padding: 20, marginBottom: 14, border: `1px solid ${T.border}` }}>
              <div style={{ fontWeight: 800, color: "#1a6b3a", marginBottom: 16 }}>🔐 Sekirite</div>
              {F("password","Omwen 6 karaktè","password")}
              {F("confirmPassword","Repete password","password")}
            </div>
            <div style={{ background: "#fff", borderRadius: 16, padding: 20, marginBottom: 14, border: `1px solid ${T.border}` }}>
              <div style={{ fontWeight: 800, color: "#1a6b3a", marginBottom: 16 }}>📍 Adres Restoran</div>
              {F("address","1204 E Washington St")} {F("apartment","Suite (Opsyonèl)")}
              <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr", gap: 10 }}>
                <div>{F("city","Indianapolis")}</div>
                <div><div style={{fontSize:11,color:T.muted,fontWeight:700,textTransform:"uppercase",marginBottom:6}}>ETA</div><input style={{...inp}} value="IN" readOnly /></div>
                <div>{F("zip","46201")}</div>
              </div>
            </div>
            <div style={{ background: "#fff", borderRadius: 16, padding: 20, marginBottom: 14, border: `1px solid ${T.border}` }}>
              <div style={{ fontWeight: 800, color: "#1a6b3a", marginBottom: 16 }}>💼 EIN Number</div>
              {F("ein_number","XX-XXXXXXX")}
              {errors.ein_number && <div style={{color:T.accent,fontSize:12}}>{errors.ein_number}</div>}
            </div>
            <div style={{ background: "#fff", borderRadius: 16, padding: 20, marginBottom: 14, border: `1px solid ${T.border}` }}>
              <div style={{ fontWeight: 800, color: "#1a6b3a", marginBottom: 16 }}>📄 Dokiman</div>
              <FileUpload label="Menu PDF (Obligatwa)" bucket="restaurant-documents" path="menu" accept=".pdf,image/*" onUpload={u => { setMenuUrl(u); setErrors(p=>({...p,menu:""})); }} />
              {errors.menu && <div style={{color:T.accent,fontSize:12,marginBottom:8}}>{errors.menu}</div>}
              <FileUpload label="Logo Restoran (Opsyonèl)" bucket="restaurant-documents" path="logo" onUpload={setLogoUrl} />
            </div>
            <button style={{...btn("linear-gradient(135deg,#1a6b3a,#0d4a28)")}}) onClick={submit} disabled={loading}>
              {loading ? "⏳ Ap soumèt..." : "🍴 Soumèt Aplikasyon"}
            </button>
          </div>
        </div>
      );
    }

    function App() {
      const [screen, setScreen] = useState("home");
      const [ready, setReady] = useState(false);

      useEffect(() => {
        // Initialize Supabase when app loads
        const initStart = setTimeout(() => {
          const success = initSupabase();
          setReady(success);
          if (!success) {
            console.error("Supabase failed to initialize");
            alert("⚠️ System initialization issue. Please refresh the page.");
          }
        }, 500);
        return () => clearTimeout(initStart);
      }, []);

      if (!ready) {
        return (
          <div style={{ maxWidth: 480, margin: "0 auto", fontFamily: "DM Sans", minHeight: "100vh", background: "linear-gradient(160deg, #003F87 0%, #002D63 45%, #D01C1F 100%)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24 }}>
            <div style={{ color: "#fff", fontSize: 16, fontWeight: 700 }}>⏳ System Loading...</div>
            <div style={{ color: "#ffffff88", fontSize: 12, marginTop: 8 }}>Please wait...</div>
          </div>
        );
      }

      if (screen === "customer") return <CustomerRegister onBack={() => setScreen("home")} />;
      if (screen === "driver") return <DriverRegister onBack={() => setScreen("home")} />;
      if (screen === "restaurant") return <RestaurantRegister onBack={() => setScreen("home")} />;

      return (
        <div style={{ maxWidth: 480, margin: "0 auto", fontFamily: "DM Sans", minHeight: "100vh", background: "linear-gradient(160deg, #003F87 0%, #002D63 45%, #D01C1F 100%)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24 }}>
          <img src={LOGO} style={{ width: 160, height: 160, borderRadius: "50%", objectFit: "cover", border: "4px solid #FFD700", marginBottom: 16 }} />
          <div style={{ color: "#ffffff88", fontSize: 14, marginBottom: 40 }}>Indianapolis Haitian Food Platform 🇭🇹</div>

          <div style={{ width: "100%", display: "flex", flexDirection: "column", gap: 14 }}>
            {[
              { id: "customer", icon: "👤", title: "Mwen se Kliyan", desc: "Kòmande manje Ayisyen livré lakay ou", color: "#fff", textColor: "#003F87" },
              { id: "driver", icon: "🚗", title: "Mwen se Chaofè", desc: "Livre manje — touche 70% delivery fee", color: "transparent", textColor: "#fff", border: "2px solid #fff" },
              { id: "restaurant", icon: "🍴", title: "Mwen se Restoran", desc: "Ajoute restoran ou sou platfòm nan", color: "transparent", textColor: "#fff", border: "2px solid #FFD700" },
            ].map((item) => (
              <button key={item.id} onClick={() => setScreen(item.id)}
                style={{ background: item.color, color: item.textColor, border: item.border || "none", borderRadius: 16, padding: "18px 20px", cursor: "pointer", fontFamily: "DM Sans", textAlign: "left", display: "flex", gap: 14, alignItems: "center" }}>
                <div style={{ fontSize: 32 }}>{item.icon}</div>
                <div>
                  <div style={{ fontWeight: 800, fontSize: 16 }}>{item.title}</div>
                  <div style={{ fontSize: 13, opacity: 0.8, marginTop: 4 }}>{item.desc}</div>
                </div>
              </button>
            ))}
          </div>

          <div style={{ textAlign: "center", marginTop: 24, color: "#ffffff66", fontSize: 13 }}>
            Ou deja gen yon kont?{" "}
            <span style={{ color: "#FFD700", fontWeight: 700, cursor: "pointer" }}
              onClick={() => window.location.href = "/"}>
              Sign In →
            </span>
          </div>
        </div>
      );
    }

    // Mount React app
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
