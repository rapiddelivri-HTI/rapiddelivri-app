    // ─── FILE UPLOAD COMPONENT ───────────────────────────────────
    function FileUpload({ label, bucket, path, onUpload, accept = "image/*" }) {
      const [uploading, setUploading] = useState(false);
      const [uploaded, setUploaded] = useState(false);
      const fileRef = useRef();

      const handleUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setUploading(true);
        try {
          const ext = file.name.split('.').pop();
          const filePath = `${path}-${Date.now()}.${ext}`;
          const { error } = await supabase.storage.from(bucket).upload(filePath, file);
          if (error) throw error;
          const { data } = supabase.storage.from(bucket).getPublicUrl(filePath);
          setUploaded(true);
          onUpload(data.publicUrl || filePath);
        } catch (err) {
          alert('Upload failed: ' + err.message);
        }
        setUploading(false);
      };

      return (
        <div style={{ marginBottom: 16 }}>
          <label style={s.label}>{label}</label>
          <div style={{ ...s.fileBox, borderColor: uploaded ? T.green : T.border }} onClick={() => fileRef.current.click()}>
            <input ref={fileRef} type="file" accept={accept} style={{ display: "none" }} onChange={handleUpload} />
            {uploading ? <div style={{ color: T.primary }}>⏳ Uploading...</div>
              : uploaded ? <div style={{ color: T.green }}>✅ Uploaded!</div>
              : <div style={{ color: T.muted }}>📎 Klike pou upload {label}</div>}
          </div>
        </div>
      );
    }

              <div style={{ padding: 20 }}>
                <div style={{ fontWeight: 800, fontSize: 16, marginBottom: 16, color: "#1a6b3a" }}>💼 Enfòmasyon Biznis</div>
                <div style={{ marginBottom: 8 }}>
                  <label style={s.label}>EIN NUMBER (Federal Tax ID)</label>
                  <input style={{ ...s.input, borderColor: errors.ein_number ? T.accent : T.border }}
                    placeholder="XX-XXXXXXX" value={form.ein_number}
                    onChange={e => { setForm(p => ({ ...p, ein_number: e.target.value })); setErrors(p => ({ ...p, ein_number: "" })); }} />
                  {errors.ein_number && <div style={{ color: T.accent, fontSize: 12, marginTop: 4 }}>{errors.ein_number}</div>}
                </div>
                <div style={{ background: "#EFF6FF", borderRadius: 10, padding: 12, fontSize: 12, color: T.muted }}>
                  ℹ️ EIN number ou a sekirize epi itilize sèlman pou verifikasyon legal.
                </div>
              </div>
            </div>

            <div style={s.card}>
              <div style={{ padding: 20 }}>
                <div style={{ fontWeight: 800, fontSize: 16, marginBottom: 16, color: "#1a6b3a" }}>📄 Dokiman</div>
                <FileUpload label="Menu PDF (Obligatwa)" bucket="restaurant-documents"
                  path="menu" accept=".pdf,image/*"
                  onUpload={url => { setMenuUrl(url); setErrors(p => ({ ...p, menu: "" })); }} />
                {errors.menu && <div style={{ color: T.accent, fontSize: 12, marginBottom: 8 }}>{errors.menu}</div>}
                <FileUpload label="Logo Restoran (Opsyonèl)" bucket="restaurant-documents"
                  path="logo" onUpload={setLogoUrl} />
              </div>
            </div>

            <div style={{ padding: "0 16px 16px" }}>
              <button style={{ ...s.btn, background: "linear-gradient(135deg, #1a6b3a, #0d4a28)" }}
                onClick={submit} disabled={loading}>
                {loading ? "⏳ Ap soumèt..." : "🍴 Soumèt Aplikasyon Restoran"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── MAIN APP ────────────────────────────────────────────────
    function App() {
      const [screen, setScreen] = useState("home");
      const [successType, setSuccessType] = useState(null);

      const handleSuccess = (type) => {
        setSuccessType(type);
        setScreen("success");
      };

      if (screen === "success") return <SuccessScreen type={successType} onBack={() => setScreen("home")} />;
      if (screen === "customer") return <CustomerRegister onBack={() => setScreen("home")} onSuccess={handleSuccess} />;
      if (screen === "driver") return <DriverRegister onBack={() => setScreen("home")} onSuccess={handleSuccess} />;
      if (screen === "restaurant") return <RestaurantRegister onBack={() => setScreen("home")} onSuccess={handleSuccess} />;

      return (
        <div style={{ ...s.app, display: "flex", flexDirection: "column", minHeight: "100vh" }}>
          <div style={{ background: `linear-gradient(160deg, ${T.primary} 0%, ${T.primaryDark} 45%, ${T.accent} 100%)`, padding: "40px 24px", textAlign: "center" }}>
            <img src={LOGO_IMG} alt="Rapid Delivri Food" style={{ height: 80, width: "auto", margin: "0 auto 16px", display: "block", borderRadius: 8 }} />
            <div style={{ color: "#ffffff88", fontSize: 14 }}>Indianapolis Haitian Food Platform</div>
          </div>

          <div style={{ flex: 1, padding: "24px 16px" }}>
            <div style={{ fontSize: 22, fontWeight: 800, textAlign: "center", marginBottom: 8, color: T.primary }}>
              Chwazi Kijan Ou Vle Kòmanse
            </div>
            <div style={{ color: T.muted, textAlign: "center", fontSize: 14, marginBottom: 24 }}>
              Kreye kont ou gratis jodi a
            </div>

            {[
              { id: "customer", icon: "👤", title: "Mwen se Kliyan", desc: "Kòmande manje Ayisyen livré lakay ou", color: T.primary },
              { id: "driver", icon: "🚗", title: "Mwen se Chaofè", desc: "Livre manje epi fè lajan - 70% delivery fee", color: T.accent },
              { id: "restaurant", icon: "🍴", title: "Mwen se Restoran", desc: "Ajoute restoran ou ak meni ou sou platfòm nan", color: "#1a6b3a" },
            ].map(({ id, icon, title, desc, color }) => (
              <div key={id} onClick={() => setScreen(id)} style={{ background: "#fff", borderRadius: 18, padding: 20, marginBottom: 14, border: `2px solid ${color}22`, cursor: "pointer", boxShadow: "0 2px 12px #00000011", display: "flex", gap: 16, alignItems: "center" }}>
                <div style={{ fontSize: 36, background: `${color}15`, borderRadius: 14, padding: "10px 14px", flexShrink: 0 }}>{icon}</div>
                <div>
                  <div style={{ fontWeight: 800, fontSize: 17, color }}>{title}</div>
                  <div style={{ color: T.muted, fontSize: 13, marginTop: 4 }}>{desc}</div>
                </div>
                <div style={{ marginLeft: "auto", color, fontSize: 22 }}>›</div>
              </div>
            ))}

            <div style={{ textAlign: "center", marginTop: 20, color: T.muted, fontSize: 13 }}>
              Ou deja gen yon kont?{" "}
              <span style={{ color: T.primary, fontWeight: 700, cursor: "pointer" }}>Konekte</span>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
